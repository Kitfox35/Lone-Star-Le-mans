<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precalc to Le Mans Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --green: #2ecc71;
    --text: #e8e8f0;
    --muted: #888899;
    --track: #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .flag-strip {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 20px;
  }

  .flag-cell { width: 18px; height: 18px; border-radius: 2px; }
  .flag-cell:nth-child(odd) { background: #fff; }
  .flag-cell:nth-child(even) { background: #111; }

  h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
  h1 span { color: var(--accent); }

  .countdown {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 1px;
  }
  .countdown strong { color: var(--accent); font-size: 15px; }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 20px 0 28px;
  }

  .view-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .view-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* Stats */
  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .progress-label span:last-child { color: var(--accent); font-weight: 700; }

  .bar-track { background: var(--track); border-radius: 99px; height: 10px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Phase header */
  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 16px;
    flex-wrap: wrap;
  }

  .phase-badge {
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .phase-title { font-size: 18px; font-weight: 600; }
  .phase-dates { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; margin-left: auto; }

  /* Week cards */
  .week-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .week-card.active-week { border-color: var(--accent); }
  .week-card.completed-week { border-color: var(--green); opacity: 0.75; }

  .week-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    gap: 14px;
  }

  .week-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    transition: all 0.2s;
  }
  .week-check.done { background: var(--green); border-color: var(--green); color: #000; }
  .week-check.current { border-color: var(--accent); background: rgba(232,184,75,0.1); }

  .week-info { flex: 1; }
  .week-label { font-size: 13px; font-weight: 600; font-family: 'Space Mono', monospace; color: var(--accent); }
  .week-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .week-toggle { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
  .week-toggle.open { transform: rotate(180deg); }

  .week-body { padding: 0 20px 16px; display: none; }
  .week-body.open { display: block; }

  .topic-section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  .topic-list { list-style: none; }

  .topic-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px; line-height: 1.4;
    cursor: pointer;
  }
  .topic-item:last-child { border-bottom: none; }

  .topic-cb {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.15s;
  }
  .topic-cb.checked { background: var(--green); border-color: var(--green); color: #000; }

  .topic-text.done-text { text-decoration: line-through; color: var(--muted); }

  .daily-tip {
    background: rgba(232,184,75,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }
  .daily-tip strong { color: var(--accent); }

  .current-badge {
    background: var(--accent); color: #000;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px; margin-left: 6px;
  }

  /* ===== DAY VIEW ===== */
  #day-view { display: none; }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .day-card.today-card { border-color: var(--accent); }
  .day-card.past-card { opacity: 0.6; }
  .day-card.done-card { border-color: var(--green); }
  .day-card.rest-card { border-color: #333; }

  .day-header {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    gap: 14px;
    user-select: none;
  }

  .day-date-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    min-width: 52px;
    flex-shrink: 0;
  }

  .day-date-block.today-block { background: var(--accent); border-color: var(--accent); }
  .day-date-block.today-block .day-dow,
  .day-date-block.today-block .day-num { color: #000; }

  .day-dow { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-num { font-size: 20px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); line-height: 1; margin-top: 2px; }

  .day-info { flex: 1; }
  .day-title { font-size: 14px; font-weight: 600; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .day-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-check.done { background: var(--green); border-color: var(--green); color: #000; }
  .day-check.today-ring { border-color: var(--accent); }

  .day-body { padding: 0 18px 14px; display: none; }
  .day-body.open { display: block; }

  .day-topic-list { list-style: none; }

  .day-topic-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px; line-height: 1.4;
    cursor: pointer;
  }
  .day-topic-item:last-child { border-bottom: none; }

  .rest-label {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 6px 0;
  }

  /* Finish line */
  .finish-line {
    margin-top: 40px;
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    background: rgba(232,184,75,0.04);
  }
  .finish-line .flag-emoji { font-size: 36px; }
  .finish-line h2 { font-size: 20px; font-weight: 700; margin: 10px 0 6px; }
  .finish-line p { color: var(--muted); font-size: 14px; }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="flag-strip">
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
  </div>
  <h1>Precalc to <span>Le Mans</span></h1>
  <div class="countdown">Jun 30 → Aug 15 &nbsp;|&nbsp; <strong id="days-left">47</strong> days to checkpoint</div>
</div>

<div class="view-toggle">
  <button class="view-btn active" id="btn-week" onclick="switchView('week')">By Week</button>
  <button class="view-btn" id="btn-day" onclick="switchView('day')">By Day</button>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="topics-done">0</div>
    <div class="stat-label">Topics Done</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="topics-total">0</div>
    <div class="stat-label">Total Topics</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="pct-done">0%</div>
    <div class="stat-label">Complete</div>
  </div>
</div>

<div class="overall-progress">
  <div class="progress-label">
    <span>OVERALL PROGRESS</span>
    <span id="progress-label-pct">0%</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div id="week-view"></div>
<div id="day-view"></div>

<div class="finish-line">
  <div class="flag-emoji">🏁</div>
  <h2>Lone Star Le Mans — September 4–6</h2>
  <p>COTA, Austin TX &nbsp;·&nbsp; Complete this by Aug 15 and the trip is yours.</p>
</div>

<button class="reset-btn" onclick="resetProgress()">Reset all progress</button>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const phases = [
  {
    label: "PHASE 1", title: "Functions & Core Algebra", dates: "Jun 30 – Jul 13",
    weeks: [
      {
        label: "WEEK 1", dates: "Jun 30 – Jul 6", current: true,
        topics: [
          "Functions – Vertical Line Test, Ordered Pairs, Domain & Range",
          "What Is a Function? + Evaluating Functions",
          "Evaluating & Graphing Piecewise Functions",
          "Increasing & Decreasing Functions + Relative Max/Min",
          "Domain and Range from a Graph",
          "How To Find Domain (Radicals, Fractions, Square Roots)",
          "Difference Quotient",
          "Function Operations",
        ],
        tip: "~2 videos/day. Pause and work examples on paper — don't just watch."
      },
      {
        label: "WEEK 2", dates: "Jul 7 – Jul 13",
        topics: [
          "Composite Functions + Decomposing Functions",
          "Even, Odd, or Neither Functions",
          "Linear Functions + Average Rate of Change",
          "Inverse Functions – Intro, Finding, Verifying",
          "Horizontal Line Test & One-to-One Functions",
          "Graphing Inverse Functions",
          "Transformations of Functions",
          "Distance Formula & Midpoint Formula",
        ],
        tip: "Master transformations — they come back everywhere in trig."
      },
    ]
  },
  {
    label: "PHASE 2", title: "Complex Numbers & Quadratics", dates: "Jul 14 – Jul 19",
    weeks: [
      {
        label: "WEEK 3", dates: "Jul 14 – Jul 19",
        topics: [
          "Imaginary Numbers – Basic Intro + Graphing Complex Numbers",
          "Adding, Subtracting, Multiplying, Dividing Complex Numbers",
          "Simplifying & Solving Equations With Complex Numbers",
          "Graphing Quadratic Functions – Transformations & Vertex Form",
          "Finding the Vertex of a Parabola (all forms)",
          "Max and Min Value Word Problems – Quadratics",
          "Writing Quadratic Equations (3 points, given solutions)",
          "Quadratic Equations – Practice Problems",
        ],
        tip: "Do 5 practice problems per topic — write it out, don't just watch."
      },
    ]
  },
  {
    label: "PHASE 3", title: "Polynomials & Rational Functions", dates: "Jul 20 – Jul 26",
    weeks: [
      {
        label: "WEEK 4", dates: "Jul 20 – Jul 26",
        topics: [
          "Graphing Polynomial Functions – End Behavior, Multiplicity, Zeros",
          "Intermediate Value Theorem",
          "Polynomial Long Division + Synthetic Division",
          "Remainder Theorem & Factor Theorem",
          "Rational Zero Theorem – Finding All Zeros",
          "Real & Imaginary Solutions of Polynomial Equations",
          "Descartes Rule of Signs + Solving Polynomial Inequalities",
          "Vertical & Horizontal & Slant Asymptotes + Graphing Rational Functions",
          "Rational Inequalities",
          "Direct, Inverse & Joint Variation Word Problems",
        ],
        tip: "High test weight. Do Descartes and Rational Zero Theorem twice."
      },
    ]
  },
  {
    label: "PHASE 4", title: "Exponential & Logarithmic Functions", dates: "Jul 27 – Aug 4",
    weeks: [
      {
        label: "WEEK 5", dates: "Jul 27 – Aug 2",
        topics: [
          "Logarithms – The Easy Way! + Writing Log Equations in Exponential Form",
          "Change of Base Formula",
          "Properties of Logarithms – Expanding & Condensing",
          "Natural Logarithms",
          "Solving Exponential Equations (basic + quadratic form)",
          "Solving Logarithmic Equations (same base + different bases)",
          "Graphing Logarithmic & Exponential Functions",
          "Compound Interest (standard + continuously compounded)",
        ],
        tip: "Learn the log rules cold — they show up in calculus too."
      },
      {
        label: "WEEK 6", dates: "Aug 3 – Aug 4",
        topics: [
          "Exponential Growth and Decay Word Problems",
          "Compound Interest & Population Growth (logs application)",
          "Logistic Growth Function",
          "Newton's Law of Cooling",
        ],
        tip: "Word problem sprint — these are the application questions on tests."
      },
    ]
  },
  {
    label: "PHASE 5", title: "Trigonometry", dates: "Aug 5 – Aug 15",
    weeks: [
      {
        label: "WEEK 7", dates: "Aug 5 – Aug 10",
        topics: [
          "Intro to Angles + Radians and Degrees",
          "Coterminal Angles (radians & degrees)",
          "Arc Length & Sector Area + Linear/Angular Speed",
          "The Unit Circle – Basic Intro + How To Remember It Fast",
          "Reference Angles in Radians & Degrees",
          "Six Trig Functions – Basic Intro",
          "Solving Right Triangles",
          "Reciprocal, Quotient, Even/Odd, Pythagorean Identities",
          "30-60-90 and 45-45-90 Special Triangles",
          "Evaluating Trig Functions Using Periodic Properties",
        ],
        tip: "Unit circle is non-negotiable — memorize it. Everything in trig builds on it."
      },
      {
        label: "WEEK 8", dates: "Aug 11 – Aug 15",
        topics: [
          "Angle of Elevation & Depression Word Problems",
          "Cofunction Identities + Finding Exact Values of Trig Functions",
          "Graphing Sine and Cosine Functions",
          "Evaluating Inverse Trig Functions",
          "Verifying Trigonometric Identities",
          "Sum & Difference Identities (sin, cos, tan)",
          "Double Angle & Half Angle Formulas",
          "Solving Trig Equations (all solutions + multiple angles)",
          "Law of Sines + Law of Cosines",
          "CHECKPOINT: Precalculus Final Exam Review (OCT video)",
        ],
        tip: "Final week — do the OCT Precalc Final Exam Review video as your checkpoint."
      },
    ]
  }
];

// Build flat topic list (week-indexed)
// Also build a day-by-day schedule: Jun 30 – Aug 15 = 47 days
// Distribute topics across days: skip Fridays after 3pm (Jumu'ah) = lighter day
// Sundays = rest

function buildDaySchedule() {
  // Flatten all topics in order
  let allTopicsFlat = [];
  phases.forEach((p, pi) => {
    p.weeks.forEach((w, wi) => {
      w.topics.forEach((t, ti) => {
        allTopicsFlat.push({ key: `${pi}-${wi}-${ti}`, text: t, phase: p.label, week: w.label });
      });
    });
  });

  // Build list of dates Jun 30 – Aug 15
  const start = new Date('2026-06-30');
  const end = new Date('2026-08-15');
  let days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(new Date(d));
  }

  // Assign topics to days
  // Sunday = rest (0), Friday = lighter (2 topics max), else 2-3 topics
  let topicIdx = 0;
  let daySchedule = [];

  days.forEach(date => {
    const dow = date.getDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat
    const isRest = dow === 0; // Sunday rest
    const isFriday = dow === 5;
    const capacity = isRest ? 0 : (isFriday ? 1 : 2);

    let dayTopics = [];
    for (let i = 0; i < capacity && topicIdx < allTopicsFlat.length; i++) {
      dayTopics.push(allTopicsFlat[topicIdx++]);
    }

    daySchedule.push({ date: new Date(date), topics: dayTopics, isRest, isFriday });
  });

  return { daySchedule, allTopicsFlat };
}

const { daySchedule, allTopicsFlat } = buildDaySchedule();

// ─── STATE ────────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('precalc_state2') || '{}'); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem('precalc_state2', JSON.stringify(s)); } catch {}
}

function updateStats() {
  const state = loadState();
  const done = allTopicsFlat.filter(t => state[t.key]).length;
  const total = allTopicsFlat.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('topics-done').textContent = done;
  document.getElementById('topics-total').textContent = total;
  document.getElementById('pct-done').textContent = pct + '%';
  document.getElementById('progress-label-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function countDaysLeft() {
  const target = new Date('2026-08-15');
  const now = new Date();
  const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  document.getElementById('days-left').textContent = Math.max(0, diff);
}

function toggleTopic(key) {
  const state = loadState();
  state[key] = !state[key];
  saveState(state);
  // Update all checkboxes with this key (week + day view may both show it)
  document.querySelectorAll(`[data-key="${key}"]`).forEach(cb => {
    if (state[key]) { cb.classList.add('checked'); cb.textContent = '✓'; }
    else { cb.classList.remove('checked'); cb.textContent = ''; }
  });
  document.querySelectorAll(`[data-text-key="${key}"]`).forEach(el => {
    if (state[key]) el.classList.add('done-text');
    else el.classList.remove('done-text');
  });
  updateStats();
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────
function renderWeekView() {
  const container = document.getElementById('week-view');
  container.innerHTML = '';
  const state = loadState();

  phases.forEach((phase, pi) => {
    const phaseEl = document.createElement('div');

    const ph = document.createElement('div');
    ph.className = 'phase-header';
    ph.innerHTML = `<span class="phase-badge">${phase.label}</span><span class="phase-title">${phase.title}</span><span class="phase-dates">${phase.dates}</span>`;
    phaseEl.appendChild(ph);

    phase.weeks.forEach((week, wi) => {
      const wid = `w-${pi}-${wi}`;
      const topicsDone = week.topics.filter((_, ti) => state[`${pi}-${wi}-${ti}`]).length;
      const weekComplete = topicsDone === week.topics.length;

      const card = document.createElement('div');
      card.className = 'week-card' + (week.current ? ' active-week' : '') + (weekComplete ? ' completed-week' : '');

      const checkClass = weekComplete ? 'done' : (week.current ? 'current' : '');
      const header = document.createElement('div');
      header.className = 'week-header';
      header.onclick = () => {
        const body = document.getElementById('body-' + wid);
        const toggle = document.getElementById('toggle-' + wid);
        const open = body.classList.toggle('open');
        toggle.classList.toggle('open', open);
      };
      header.innerHTML = `
        <div class="week-check ${checkClass}">${weekComplete ? '✓' : ''}</div>
        <div class="week-info">
          <div class="week-label">${week.label}${week.current ? '<span class="current-badge">NOW</span>' : ''}</div>
          <div class="week-dates">${week.dates} &nbsp;·&nbsp; ${topicsDone}/${week.topics.length} topics</div>
        </div>
        <div class="week-toggle${week.current ? ' open' : ''}" id="toggle-${wid}">▾</div>
      `;
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'week-body' + (week.current ? ' open' : '');
      body.id = 'body-' + wid;

      const label = document.createElement('div');
      label.className = 'topic-section-label';
      label.textContent = 'TOPICS / VIDEOS';
      body.appendChild(label);

      const ul = document.createElement('ul');
      ul.className = 'topic-list';

      week.topics.forEach((topic, ti) => {
        const key = `${pi}-${wi}-${ti}`;
        const isDone = !!state[key];
        const li = document.createElement('li');
        li.className = 'topic-item';
        li.innerHTML = `
          <div class="topic-cb ${isDone ? 'checked' : ''}" data-key="${key}">${isDone ? '✓' : ''}</div>
          <span class="topic-text ${isDone ? 'done-text' : ''}" data-text-key="${key}">${topic}</span>
        `;
        li.addEventListener('click', () => toggleTopic(key));
        ul.appendChild(li);
      });
      body.appendChild(ul);

      const tip = document.createElement('div');
      tip.className = 'daily-tip';
      tip.innerHTML = `<strong>TIP:</strong> ${week.tip}`;
      body.appendChild(tip);

      card.appendChild(body);
      phaseEl.appendChild(card);
    });

    container.appendChild(phaseEl);
  });
}

// ─── DAY VIEW ─────────────────────────────────────────────────────────
const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderDayView() {
  const container = document.getElementById('day-view');
  container.innerHTML = '';
  const state = loadState();
  const today = new Date();
  today.setHours(0,0,0,0);

  // Group days by week label for sub-headers
  let currentWeekLabel = '';

  daySchedule.forEach((day, di) => {
    const dDate = new Date(day.date);
    dDate.setHours(0,0,0,0);
    const isToday = dDate.getTime() === today.getTime();
    const isPast = dDate < today;
    const dow = day.date.getDay();
    const dayDone = day.topics.length > 0 && day.topics.every(t => state[t.key]);

    // Week sub-header based on phase/week
    if (day.topics.length > 0) {
      const weekLabel = day.topics[0].week;
      if (weekLabel !== currentWeekLabel) {
        currentWeekLabel = weekLabel;
        const wh = document.createElement('div');
        wh.className = 'phase-header';
        wh.innerHTML = `<span class="phase-badge">${weekLabel}</span><span class="phase-dates" style="font-size:12px;color:var(--muted)">${day.topics[0].phase}</span>`;
        container.appendChild(wh);
      }
    } else if (day.isRest && currentWeekLabel !== '') {
      // show rest under current week, no sub-header needed
    }

    const card = document.createElement('div');
    let cardClass = 'day-card';
    if (isToday) cardClass += ' today-card';
    else if (dayDone) cardClass += ' done-card';
    else if (isPast) cardClass += ' past-card';
    else if (day.isRest) cardClass += ' rest-card';
    card.className = cardClass;

    const did = 'day-' + di;
    const header = document.createElement('div');
    header.className = 'day-header';
    header.onclick = () => {
      const body = document.getElementById('body-' + did);
      if (body) body.classList.toggle('open');
    };

    const topicsText = day.isRest ? 'Rest day' : (day.topics.length === 0 ? 'Buffer' : `${day.topics.filter(t=>state[t.key]).length}/${day.topics.length} done`);
    const mainTopic = day.topics.length > 0 ? day.topics[0].text.split('–')[0].split('+')[0].trim() : (day.isRest ? 'Rest & Review' : 'Catch-up Buffer');
    const extraCount = day.topics.length > 1 ? ` + ${day.topics.length - 1} more` : '';

    header.innerHTML = `
      <div class="day-date-block ${isToday ? 'today-block' : ''}">
        <div class="day-dow">${DOW_NAMES[dow]}</div>
        <div class="day-num">${day.date.getDate()}</div>
      </div>
      <div class="day-info">
        <div class="day-title">${mainTopic}${extraCount}</div>
        <div class="day-subtitle">${MONTH_NAMES[day.date.getMonth()]} ${day.date.getDate()} &nbsp;·&nbsp; ${topicsText}${isToday ? ' &nbsp;<span style="color:var(--accent);font-weight:700">← TODAY</span>' : ''}</div>
      </div>
      <div class="day-check ${dayDone ? 'done' : (isToday ? 'today-ring' : '')}">${dayDone ? '✓' : ''}</div>
    `;
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'day-body' + (isToday ? ' open' : '');
    body.id = 'body-' + did;

    if (day.isRest) {
      const r = document.createElement('div');
      r.className = 'rest-label';
      r.textContent = 'Sunday — rest, review notes, or catch up on anything from last week.';
      body.appendChild(r);
    } else if (day.topics.length === 0) {
      const r = document.createElement('div');
      r.className = 'rest-label';
      r.textContent = 'Buffer day — use this to catch up or review weak spots.';
      body.appendChild(r);
    } else {
      const lbl = document.createElement('div');
      lbl.className = 'topic-section-label';
      lbl.style.marginBottom = '8px';
      lbl.textContent = "TODAY'S VIDEOS";
      body.appendChild(lbl);

      const ul = document.createElement('ul');
      ul.className = 'day-topic-list';

      day.topics.forEach(topic => {
        const isDone = !!state[topic.key];
        const li = document.createElement('li');
        li.className = 'day-topic-item';
        li.innerHTML = `
          <div class="topic-cb ${isDone ? 'checked' : ''}" data-key="${topic.key}">${isDone ? '✓' : ''}</div>
          <span class="topic-text ${isDone ? 'done-text' : ''}" data-text-key="${topic.key}">${topic.text}</span>
        `;
        li.addEventListener('click', () => toggleTopic(topic.key));
        ul.appendChild(li);
      });

      body.appendChild(ul);

      if (day.isFriday) {
        const tip = document.createElement('div');
        tip.className = 'daily-tip';
        tip.innerHTML = `<strong>FRIDAY:</strong> Lighter load — Jumu'ah first, one topic after.`;
        body.appendChild(tip);
      }
    }

    card.appendChild(body);
    container.appendChild(card);
  });
}

// ─── VIEW SWITCH ──────────────────────────────────────────────────────
function switchView(v) {
  document.getElementById('week-view').style.display = v === 'week' ? 'block' : 'none';
  document.getElementById('day-view').style.display = v === 'day' ? 'block' : 'none';
  document.getElementById('btn-week').classList.toggle('active', v === 'week');
  document.getElementById('btn-day').classList.toggle('active', v === 'day');
}

function resetProgress() {
  if (confirm('Reset all progress?')) {
    try { localStorage.removeItem('precalc_state2'); } catch {}
    document.querySelectorAll('.topic-cb').forEach(cb => { cb.classList.remove('checked'); cb.textContent = ''; });
    document.querySelectorAll('.topic-text').forEach(t => t.classList.remove('done-text'));
    updateStats();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────
renderWeekView();
renderDayView();
updateStats();
countDaysLeft();
switchView('week');
</script>
</body>
</html>

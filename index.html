<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precalc to Le Mans Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --green: #2ecc71;
    --text: #e8e8f0;
    --muted: #888899;
    --track: #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header { text-align: center; padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .flag-strip { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; }
  .flag-cell { width: 18px; height: 18px; border-radius: 2px; }
  .flag-cell:nth-child(odd) { background: #fff; }
  .flag-cell:nth-child(even) { background: #111; }
  h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .countdown { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); margin-top: 10px; letter-spacing: 1px; }
  .countdown strong { color: var(--accent); font-size: 15px; }

  .view-toggle { display: flex; gap: 8px; justify-content: center; margin: 20px 0 28px; }
  .view-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .overall-progress { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 10px; font-family: 'Space Mono', monospace; }
  .progress-label span:last-child { color: var(--accent); font-weight: 700; }
  .bar-track { background: var(--track); border-radius: 99px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.4s ease; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'Space Mono', monospace; font-size: clamp(20px, 3vw, 28px); font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .phase-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 16px; flex-wrap: wrap; }
  .phase-badge { background: var(--accent); color: #000; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; }
  .phase-title { font-size: 18px; font-weight: 600; }
  .phase-dates { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; margin-left: auto; }

  .week-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .week-card.active-week { border-color: var(--accent); }
  .week-card.completed-week { border-color: var(--green); opacity: 0.75; }

  .week-header { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; user-select: none; gap: 14px; }
  .week-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all 0.2s; }
  .week-check.done { background: var(--green); border-color: var(--green); color: #000; }
  .week-check.current { border-color: var(--accent); background: rgba(232,184,75,0.1); }
  .week-info { flex: 1; }
  .week-label { font-size: 13px; font-weight: 600; font-family: 'Space Mono', monospace; color: var(--accent); }
  .week-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .week-toggle { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
  .week-toggle.open { transform: rotate(180deg); }
  .week-body { padding: 0 20px 16px; display: none; }
  .week-body.open { display: block; }

  .topic-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; font-family: 'Space Mono', monospace; }
  .topic-list { list-style: none; }

  .topic-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .topic-item:last-child { border-bottom: none; }

  .topic-cb { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.15s; cursor: pointer; }
  .topic-cb.checked { background: var(--green); border-color: var(--green); color: #000; }

  .topic-content { flex: 1; cursor: pointer; }
  .topic-name { font-size: 14px; }
  .topic-name.done-text { text-decoration: line-through; color: var(--muted); }

  .video-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
  .video-link {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
    cursor: pointer;
  }
  .video-link:hover { background: rgba(232,184,75,0.12); border-color: var(--accent); }
  .video-link svg { flex-shrink: 0; }

  .daily-tip { background: rgba(232,184,75,0.07); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 10px 14px; font-size: 13px; color: var(--muted); margin-top: 10px; }
  .daily-tip strong { color: var(--accent); }

  .current-badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; font-family: 'Space Mono', monospace; letter-spacing: 0.5px; margin-left: 6px; }

  /* DAY VIEW */
  #day-view { display: none; }
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .day-card.today-card { border-color: var(--accent); }
  .day-card.past-card { opacity: 0.6; }
  .day-card.done-card { border-color: var(--green); }
  .day-card.rest-card { border-color: #333; }

  .day-header { display: flex; align-items: center; padding: 14px 18px; cursor: pointer; gap: 14px; user-select: none; }
  .day-date-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; text-align: center; min-width: 52px; flex-shrink: 0; }
  .day-date-block.today-block { background: var(--accent); border-color: var(--accent); }
  .day-date-block.today-block .day-dow, .day-date-block.today-block .day-num { color: #000; }
  .day-dow { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-num { font-size: 20px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); line-height: 1; margin-top: 2px; }
  .day-info { flex: 1; }
  .day-title { font-size: 14px; font-weight: 600; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .day-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: all 0.2s; }
  .day-check.done { background: var(--green); border-color: var(--green); color: #000; }
  .day-check.today-ring { border-color: var(--accent); }

  .day-body { padding: 0 18px 14px; display: none; }
  .day-body.open { display: block; }
  .day-topic-list { list-style: none; }
  .day-topic-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .day-topic-item:last-child { border-bottom: none; }

  .rest-label { font-size: 13px; color: var(--muted); font-style: italic; padding: 6px 0; }

  .finish-line { margin-top: 40px; border: 1px solid var(--accent); border-radius: 12px; padding: 28px; text-align: center; background: rgba(232,184,75,0.04); }
  .finish-line .flag-emoji { font-size: 36px; }
  .finish-line h2 { font-size: 20px; font-weight: 700; margin: 10px 0 6px; }
  .finish-line p { color: var(--muted); font-size: 14px; }

  .reset-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; margin-top: 20px; display: block; margin-left: auto; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="flag-strip">
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
    <div class="flag-cell"></div><div class="flag-cell"></div><div class="flag-cell"></div>
  </div>
  <h1>Precalc to <span>Le Mans</span></h1>
  <div class="countdown">Jun 30 → Aug 15 &nbsp;|&nbsp; <strong id="days-left">47</strong> days to checkpoint</div>
</div>

<div class="view-toggle">
  <button class="view-btn active" id="btn-week" onclick="switchView('week')">By Week</button>
  <button class="view-btn" id="btn-day" onclick="switchView('day')">By Day</button>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="topics-done">0</div><div class="stat-label">Topics Done</div></div>
  <div class="stat-card"><div class="stat-num" id="topics-total">0</div><div class="stat-label">Total Topics</div></div>
  <div class="stat-card"><div class="stat-num" id="pct-done">0%</div><div class="stat-label">Complete</div></div>
</div>

<div class="overall-progress">
  <div class="progress-label"><span>OVERALL PROGRESS</span><span id="progress-label-pct">0%</span></div>
  <div class="bar-track"><div class="bar-fill" id="progress-bar" style="width:0%"></div></div>
</div>

<div id="week-view"></div>
<div id="day-view"></div>

<div class="finish-line">
  <div class="flag-emoji">🏁</div>
  <h2>Lone Star Le Mans — September 4–6</h2>
  <p>COTA, Austin TX &nbsp;·&nbsp; Complete this by Aug 15 and the trip is yours.</p>
</div>

<button class="reset-btn" onclick="resetProgress()">Reset all progress</button>

const phases = [

// ─── BUILD FLAT + DAY SCHEDULE ────────────────────────────────────────
function buildDaySchedule() {
  let allTopicsFlat = [];
  phases.forEach((p, pi) => {
    p.weeks.forEach((w, wi) => {
      w.topics.forEach((t, ti) => {
        allTopicsFlat.push({ key: `${pi}-${wi}-${ti}`, text: t.text, videos: t.videos, phase: p.label, week: w.label });
      });
    });
  });

  const start = new Date('2026-06-30');
  const end = new Date('2026-08-15');
  let days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d));

  let topicIdx = 0;
  let daySchedule = [];
  days.forEach(date => {
    const dow = date.getDay();
    const isRest = dow === 0;
    const isFriday = dow === 5;
    const capacity = isRest ? 0 : (isFriday ? 1 : 2);
    let dayTopics = [];
    for (let i = 0; i < capacity && topicIdx < allTopicsFlat.length; i++) dayTopics.push(allTopicsFlat[topicIdx++]);
    daySchedule.push({ date: new Date(date), topics: dayTopics, isRest, isFriday });
  });

  return { daySchedule, allTopicsFlat };
}

const { daySchedule, allTopicsFlat } = buildDaySchedule();

// ─── STATE ────────────────────────────────────────────────────────────
function loadState() { return cachedState; }
function saveState(s) {
  cachedState = s;
  setDoc(stateDocRef, { state: s }).catch(err => console.error('Sync failed:', err));
}
function refreshAllUI() { renderWeekView(); renderDayView(); updateStats(); }

function updateStats() {
  const state = loadState();
  const done = allTopicsFlat.filter(t => state[t.key]).length;
  const total = allTopicsFlat.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('topics-done').textContent = done;
  document.getElementById('topics-total').textContent = total;
  document.getElementById('pct-done').textContent = pct + '%';
  document.getElementById('progress-label-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function countDaysLeft() {
  const diff = Math.ceil((new Date('2026-08-15') - new Date()) / 86400000);
  document.getElementById('days-left').textContent = Math.max(0, diff);
}

function toggleTopic(key) {
  const state = loadState();
  state[key] = !state[key];
  saveState(state);
  document.querySelectorAll(`[data-key="${key}"]`).forEach(cb => {
    cb.classList.toggle('checked', !!state[key]);
    cb.textContent = state[key] ? '✓' : '';
  });
  document.querySelectorAll(`[data-text-key="${key}"]`).forEach(el => el.classList.toggle('done-text', !!state[key]));
  updateStats();
}

// ─── VIDEO LINKS HTML ─────────────────────────────────────────────────
function videoLinksHTML(videos) {
  if (!videos || !videos.length) return '';
  return '<div class="video-links">' + videos.map(v => vlink(v.title, v.url)).join('') + '</div>';
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────
function renderWeekView() {
  const container = document.getElementById('week-view');
  container.innerHTML = '';
  const state = loadState();

  phases.forEach((phase, pi) => {
    const phaseEl = document.createElement('div');
    phaseEl.innerHTML = `<div class="phase-header"><span class="phase-badge">${phase.label}</span><span class="phase-title">${phase.title}</span><span class="phase-dates">${phase.dates}</span></div>`;

    phase.weeks.forEach((week, wi) => {
      const wid = `w-${pi}-${wi}`;
      const topicsDone = week.topics.filter((_, ti) => state[`${pi}-${wi}-${ti}`]).length;
      const weekComplete = topicsDone === week.topics.length;
      const checkClass = weekComplete ? 'done' : (week.current ? 'current' : '');

      const card = document.createElement('div');
      card.className = 'week-card' + (week.current ? ' active-week' : '') + (weekComplete ? ' completed-week' : '');

      const header = document.createElement('div');
      header.className = 'week-header';
      header.onclick = () => {
        document.getElementById('body-' + wid).classList.toggle('open');
        document.getElementById('toggle-' + wid).classList.toggle('open');
      };
      header.innerHTML = `
        <div class="week-check ${checkClass}">${weekComplete ? '✓' : ''}</div>
        <div class="week-info">
          <div class="week-label">${week.label}${week.current ? '<span class="current-badge">NOW</span>' : ''}</div>
          <div class="week-dates">${week.dates} &nbsp;·&nbsp; ${topicsDone}/${week.topics.length} topics</div>
        </div>
        <div class="week-toggle${week.current ? ' open' : ''}" id="toggle-${wid}">▾</div>`;
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'week-body' + (week.current ? ' open' : '');
      body.id = 'body-' + wid;

      const lbl = document.createElement('div');
      lbl.className = 'topic-section-label';
      lbl.textContent = 'TOPICS / VIDEOS';
      body.appendChild(lbl);

      const ul = document.createElement('ul');
      ul.className = 'topic-list';

      week.topics.forEach((topic, ti) => {
        const key = `${pi}-${wi}-${ti}`;
        const isDone = !!state[key];
        const li = document.createElement('li');
        li.className = 'topic-item';
        li.innerHTML = `
          <div class="topic-cb ${isDone ? 'checked' : ''}" data-key="${key}">${isDone ? '✓' : ''}</div>
          <div class="topic-content">
            <div class="topic-name ${isDone ? 'done-text' : ''}" data-text-key="${key}">${topic.text}</div>
            ${videoLinksHTML(topic.videos)}
          </div>`;
        li.querySelector('.topic-cb').addEventListener('click', (e) => { e.stopPropagation(); toggleTopic(key); });
        li.querySelector('.topic-content .topic-name').addEventListener('click', () => toggleTopic(key));
        ul.appendChild(li);
      });
      body.appendChild(ul);

      body.innerHTML += `<div class="daily-tip"><strong>TIP:</strong> ${week.tip}</div>`;
      card.appendChild(body);
      phaseEl.appendChild(card);
    });

    container.appendChild(phaseEl);
  });
}

// ─── DAY VIEW ─────────────────────────────────────────────────────────
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderDayView() {
  const container = document.getElementById('day-view');
  container.innerHTML = '';
  const state = loadState();
  const today = new Date(); today.setHours(0,0,0,0);
  let currentWeekLabel = '';

  daySchedule.forEach((day, di) => {
    const dDate = new Date(day.date); dDate.setHours(0,0,0,0);
    const isToday = dDate.getTime() === today.getTime();
    const isPast = dDate < today;
    const dow = day.date.getDay();
    const dayDone = day.topics.length > 0 && day.topics.every(t => state[t.key]);

    if (day.topics.length > 0) {
      const wl = day.topics[0].week;
      if (wl !== currentWeekLabel) {
        currentWeekLabel = wl;
        const wh = document.createElement('div');
        wh.className = 'phase-header';
        wh.innerHTML = `<span class="phase-badge">${wl}</span><span class="phase-dates">${day.topics[0].phase}</span>`;
        container.appendChild(wh);
      }
    }

    const card = document.createElement('div');
    let cc = 'day-card';
    if (isToday) cc += ' today-card';
    else if (dayDone) cc += ' done-card';
    else if (isPast) cc += ' past-card';
    else if (day.isRest) cc += ' rest-card';
    card.className = cc;

    const did = 'day-' + di;
    const mainTopic = day.topics.length > 0 ? day.topics[0].text.replace('🏁 ', '').split('–')[0].split('+')[0].trim() : (day.isRest ? 'Rest & Review' : 'Buffer');
    const extra = day.topics.length > 1 ? ` + ${day.topics.length - 1} more` : '';
    const topicsText = day.isRest ? 'Rest day' : (day.topics.length === 0 ? 'Buffer' : `${day.topics.filter(t=>state[t.key]).length}/${day.topics.length} done`);

    const header = document.createElement('div');
    header.className = 'day-header';
    header.onclick = () => { const b = document.getElementById('body-' + did); if(b) b.classList.toggle('open'); };
    header.innerHTML = `
      <div class="day-date-block ${isToday ? 'today-block' : ''}">
        <div class="day-dow">${DOW[dow]}</div>
        <div class="day-num">${day.date.getDate()}</div>
      </div>
      <div class="day-info">
        <div class="day-title">${mainTopic}${extra}</div>
        <div class="day-subtitle">${MON[day.date.getMonth()]} ${day.date.getDate()} &nbsp;·&nbsp; ${topicsText}${isToday ? ' &nbsp;<span style="color:var(--accent);font-weight:700">← TODAY</span>' : ''}</div>
      </div>
      <div class="day-check ${dayDone ? 'done' : (isToday ? 'today-ring' : '')}">${dayDone ? '✓' : ''}</div>`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'day-body' + (isToday ? ' open' : '');
    body.id = 'body-' + did;

    if (day.isRest) {
      body.innerHTML = '<div class="rest-label">Sunday — rest, review notes, or catch up on anything from last week.</div>';
    } else if (day.topics.length === 0) {
      body.innerHTML = '<div class="rest-label">Buffer day — use this to catch up or review weak spots.</div>';
    } else {
      const lbl = document.createElement('div');
      lbl.className = 'topic-section-label';
      lbl.style.marginBottom = '8px';
      lbl.textContent = "TODAY'S VIDEOS";
      body.appendChild(lbl);

      const ul = document.createElement('ul');
      ul.className = 'day-topic-list';
      day.topics.forEach(topic => {
        const isDone = !!state[topic.key];
        const li = document.createElement('li');
        li.className = 'day-topic-item';
        li.innerHTML = `
          <div class="topic-cb ${isDone ? 'checked' : ''}" data-key="${topic.key}">${isDone ? '✓' : ''}</div>
          <div class="topic-content">
            <div class="topic-name ${isDone ? 'done-text' : ''}" data-text-key="${topic.key}">${topic.text}</div>
            ${videoLinksHTML(topic.videos)}
          </div>`;
        li.querySelector('.topic-cb').addEventListener('click', (e) => { e.stopPropagation(); toggleTopic(topic.key); });
        li.querySelector('.topic-name').addEventListener('click', () => toggleTopic(topic.key));
        ul.appendChild(li);
      });
      body.appendChild(ul);
      if (day.isFriday) body.innerHTML += `<div class="daily-tip"><strong>FRIDAY:</strong> Lighter load — Jumu'ah first, one topic after.</div>`;
    }

    card.appendChild(body);
    container.appendChild(card);
  });
}

// ─── VIEW SWITCH ──────────────────────────────────────────────────────
function switchView(v) {
  document.getElementById('week-view').style.display = v === 'week' ? 'block' : 'none';
  document.getElementById('day-view').style.display = v === 'day' ? 'block' : 'none';
  document.getElementById('btn-week').classList.toggle('active', v === 'week');
  document.getElementById('btn-day').classList.toggle('active', v === 'day');
}

function resetProgress() {
  if (confirm('Reset all progress?')) { saveState({}); renderWeekView(); renderDayView(); updateStats(); }
}

// Init
renderWeekView();
renderDayView();
updateStats();
countDaysLeft();
switchView('week');
</script>
</body>
